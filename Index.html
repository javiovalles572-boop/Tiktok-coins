<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recargar Monedas TikTok</title>
<style>
*{margin:0;padding:0;font-family:Arial,sans-serif;box-sizing:border-box}
body{background:#fff;color:#000;max-width:450px;margin:0 auto;padding:15px}
.header{text-align:center;margin-bottom:20px}
.logo{font-size:45px;font-weight:bold;color:#ff0050}
.balance{font-size:24px;margin:10px 0;color:#ffd700}
.input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.pack{background:#f5f5f5;padding:15px;border-radius:8px;text-align:center}
.coin{font-size:19px;font-weight:bold;color:#ffd700}
.price{font-size:14px;color:#666;margin-top:4px}
.btn{width:100%;background:#ff0050;color:#fff;border:none;padding:15px;border-radius:8px;font-size:18px;font-weight:bold}
</style>
</head>
<body>
<div class="header">
<div class="logo">TikTok</div>
<div class="balance">💎 339,992,029</div>
</div>
<input type="text" class="input" placeholder="@Usuario">
<div class="grid">
<div class="pack"><div class="coin">70 💎</div><div class="price">$0.60</div></div>
<div class="pack"><div class="coin">350 💎</div><div class="price">$3.00</div></div>
<div class="pack"><div class="coin">700 💎</div><div class="price">$6.00</div></div>
<div class="pack"><div class="coin">1,400 💎</div><div class="price">$12.00</div></div>
<div class="pack"><div class="coin">3,500 💎</div><div class="price">$30.00</div></div>
<div class="pack"><div class="coin">7,000 💎</div><div class="price">$60.00</div></div>
<div class="pack"><div class="coin">15,000 💎</div><div class="price">$120.00</div></div>
<div class="pack"><div class="coin">Personalizado</div><div class="price">—</div></div>
</div>
<button class="btn">Recargar</button>
</body>
</html>
